<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Khazane-DZ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; width: 100vw;
    background: transparent;
    -webkit-app-region: drag;
    user-select: none;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 48px 40px 36px;
    text-align: center;
    width: 380px;
  }
  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px; color: white; font-weight: bold;
  }
  h1 {
    font-size: 22px; font-weight: 700; color: #1e293b;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 13px; color: #94a3b8; margin-bottom: 28px;
  }
  .spinner-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 12px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #e2e8f0;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status {
    font-size: 13px; color: #64748b;
    min-height: 18px;
  }
  .footer {
    margin-top: 20px;
    font-size: 11px; color: #cbd5e1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">K</div>
    <h1>Khazane-DZ</h1>
    <p class="tagline">Gestion de Stock Intelligente</p>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span id="status">Initialisation...</span>
    </div>
    <div class="footer">v0.1.0</div>
  </div>
  <script>
    if (window.khazane) {
      window.khazane.onStatus((msg) => {
        document.getElementById('status').textContent = msg;
      });
    }
  </script>
</body>
</html>
