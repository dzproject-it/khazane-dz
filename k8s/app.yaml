apiVersion: apps/v1
kind: Deployment
metadata:
  name: khazane-app
  namespace: khazane
  labels:
    app: khazane-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: khazane-app
  template:
    metadata:
      labels:
        app: khazane-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready!"
        - name: run-migrations
          image: khazane-dz:latest
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - npx prisma migrate deploy
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: khazane-secrets
                  key: DATABASE_URL
      containers:
        - name: khazane-app
          image: khazane-dz:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: SERVE_STATIC
              value: "true"
            - name: STATIC_PATH
              value: /app/frontend-dist
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: khazane-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: khazane-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: khazane-secrets
                  key: REDIS_HOST
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: khazane-app
  namespace: khazane
spec:
  selector:
    app: khazane-app
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
