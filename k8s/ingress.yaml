apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: khazane-ingress
  namespace: khazane
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: khazane.87.106.4.161.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: khazane-app
                port:
                  number: 80
